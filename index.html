<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CORTIS KMA 2026 Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>🏆 CORTIS KMA 2026 Tracker</h1>

    <p class="subtitle">
        Overall standings across Session 1 + Session 2 + Final Voting
    </p>

    <!-- SUMMARY -->

    <div class="card">

        <h2>CORTIS Overall</h2>

        <div class="big-number" id="overallTotal">0</div>

        <div class="rank-row">

            <div class="rank-box">
                <span>Overall Rank</span>
                <strong id="overallRank">#0</strong>
            </div>

            <div class="rank-box">
                <span>Final Rank</span>
                <strong id="liveRank">#0</strong>
            </div>

        </div>

    </div>

    <!-- SESSION BREAKDOWN -->

    <div class="card">

        <h2>Vote Breakdown</h2>

        <div class="stats">

            <div class="stat">
                <span>Session 1</span>
                <strong id="session1">0</strong>
            </div>

            <div class="stat">
                <span>Session 2</span>
                <strong id="session2">0</strong>
            </div>

            <div class="stat">
                <span>Final</span>
                <strong id="final">0</strong>
            </div>

        </div>

    </div>

    <!-- GAP -->

    <div class="card gap-card">

        <h2 id="gapTitle">Gap</h2>

        <div class="big-number" id="gap">0</div>

        <p id="gapGoal"></p>

        <small id="status"></small>

    </div>

    <!-- FILTER -->

    <div class="card">

        <h2>🏅 Live Leaderboard</h2>

        <div class="filters">

            <button class="filter active" data-filter="overall">
                Overall
            </button>

            <button class="filter" data-filter="final">
                Final
            </button>

            <button class="filter" data-filter="session1">
                Session 1
            </button>

            <button class="filter" data-filter="session2">
                Session 2
            </button>

        </div>

    </div>

    <!-- TOP 3 -->

    <div class="card">

        <h2>🥇 Top 3</h2>

        <div id="top3Container">

            <!-- generated by JavaScript -->

        </div>

    </div>

    <!-- FULL LEADERBOARD -->

    <div class="card">

        <h2>📊 Rankings</h2>

        <div id="leaderboard">

            <!-- generated by JavaScript -->

        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">

        <p id="updated"></p>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
