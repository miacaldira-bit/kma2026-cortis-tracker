name: Update KMA Votes

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Download JSON
        run: |
          curl -L \
          "https://my1pick.s3.ap-northeast-2.amazonaws.com/kmc/prd-Final-EarlyGlobalRisingStar.json" \
          -o data.json

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data.json

          git diff --cached --quiet || git commit -m "Update votes"

          git push
