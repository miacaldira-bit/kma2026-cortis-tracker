name: Update KMA Votes

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest JSON
        run: |
          curl -L \
            -H "Cache-Control: no-cache, no-store" \
            -H "Pragma: no-cache" \
            -H "Expires: 0" \
            "https://my1pick.s3.ap-northeast-2.amazonaws.com/kmc/prd-Final-EarlyGlobalRisingStar.json?nocache=$(date +%s)" \
            -o data.json

      - name: Verify downloaded data
        run: |
          echo "=== Campaign ==="
          grep '"campaign_idx"' data.json

          echo ""
          echo "=== Vote totals ==="
          grep -o '"total_vote_count":[0-9]*' data.json | head -15

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data.json

          git diff --cached --quiet || git commit -m "Update votes"

          git push
