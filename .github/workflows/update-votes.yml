name: Update KMA Votes

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest JSON
        run: |
          curl -L \
            -H "Cache-Control: no-cache, no-store" \
            -H "Pragma: no-cache" \
            -H "Expires: 0" \
            "https://my1pick.s3.ap-northeast-2.amazonaws.com/kmc/prd-Final-EarlyGlobalRisingStar.json?nocache=$(date +%s)" \
            -o data.json

      - name: Verify downloaded data
        run: |
          python3 << 'EOF'
          import json

          with open("data.json", encoding="utf-8") as f:
              data = json.load(f)

          print("=" * 60)
          print("Downloaded CORTIS data")
          print("=" * 60)

          for group in data["list"]:
              if group["name2"] == "CORTIS":
                  print(json.dumps(group, indent=2, ensure_ascii=False))
                  break
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data.json

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update votes"
            git push
          fi
